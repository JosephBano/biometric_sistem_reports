<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — {{ nombre_sistema }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <h4 class="fw-bold mb-1">{{ nombre_institucion }}</h4>
                <p class="opacity-75 small mb-0">{{ nombre_sistema }}</p>
            </div>
            <div class="login-body">
                {% if error %}
                <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
                {% endif %}
                <form method="POST" action="/login">
                    <div class="mb-4">
                        <label class="form-label" for="password">Contraseña de acceso</label>
                        <input type="password" class="form-control" id="password" name="password" autofocus
                            autocomplete="current-password" required placeholder="Ingrese su contraseña">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Ingresar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
