<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — {{ nombre_sistema }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo mb-2">
                    <span class="material-symbols-outlined" style="font-size: 2.5rem; opacity: 0.9;">fingerprint</span>
                </div>
                <h4 class="fw-bold mb-1">{{ nombre_institucion }}</h4>
                <p class="opacity-75 small mb-0">{{ nombre_sistema }}</p>
            </div>
            <div class="login-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label" for="email">Correo electrónico</label>
                        <div class="input-icon-wrapper position-relative">
                            <span class="material-symbols-outlined input-icon">mail</span>
                            <input type="email" class="form-control" id="email" name="email"
                                autofocus autocomplete="email" required
                                placeholder="usuario@institucion.edu.ec"
                                value="{{ email_previo or '' }}">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password">Contraseña</label>
                        <div class="input-icon-wrapper position-relative">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input type="password" class="form-control" id="password" name="password"
                                autocomplete="current-password" required placeholder="Ingrese su contraseña">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2">
                            <span class="material-symbols-outlined" style="font-size: 1.1rem;">login</span>
                            Ingresar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <style>
        .input-icon-wrapper .form-control {
            padding-left: 2.75rem;
        }
        .input-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: var(--color-text-muted);
        }
    </style>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="loginToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="d-flex">
                <div class="toast-body">
                    {{ error }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% if error %}
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var toastEl = document.getElementById('loginToast');
            var toast = new bootstrap.Toast(toastEl);
            toast.show();
        });
    </script>
    {% endif %}

</body>
</html>
