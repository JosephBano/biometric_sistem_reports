<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Informes Biométricos - RRHH ISTPET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            color: #333;
        }
        .container-main {
            max-width: 800px;
            margin: 40px auto;
        }
        .header-bg {
            background: linear-gradient(135deg, #1a3a5c 0%, #2e6da4 100%);
            color: white;
            padding: 30px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
        .card-body {
            background: white;
            padding: 40px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background-color: #f8fafc;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #2e6da4;
            background-color: #eff6ff;
        }
        .upload-icon {
            font-size: 3rem;
            color: #64748b;
            margin-bottom: 15px;
        }
        .form-label {
            font-weight: 600;
            color: #475569;
        }
        .btn-primary {
            background-color: #2e6da4;
            border-color: #2e6da4;
            padding: 12px 24px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #1a3a5c;
            border-color: #1a3a5c;
        }
        .config-panel {
            background-color: #f1f5f9;
            border-radius: 8px;
            padding: 20px;
            margin-top: 15px;
        }
        #file-info {
            display: none;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: #e2e8f0;
            text-align: center;
            font-weight: 500;
        }
        #persona-group {
            display: none;
        }
        .spinner-container {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .alert {
            display: none;
        }
    </style>
</head>
<body>

<div class="container container-main">
    <div class="header-bg">
        <h2 class="mb-1 fw-bold">GENERADOR DE INFORMES BIOMÉTRICOS</h2>
        <h5 class="fw-normal opacity-75">Sistema RRHH · ISTPET</h5>
    </div>
    
    <div class="card-body">
        <!-- Error Alert -->
        <div class="alert alert-danger" id="error-alert" role="alert"></div>
        <div class="alert alert-success" id="success-alert" role="alert"></div>

        <!-- File Upload Area -->
        <div class="upload-area" id="drop-zone">
            <input type="file" id="file-input" style="display: none;" accept=".xls,.xlsx,.csv">
            <div class="upload-icon">📄</div>
            <h5 class="fw-bold text-slate-700">Arrastre su archivo aquí o haga clic</h5>
            <p class="text-muted mb-0">Se aceptan archivos .xls, .xlsx y .csv de control biométrico</p>
        </div>

        <div id="file-info">
            <span id="file-name"></span>
            <button type="button" class="btn btn-sm btn-outline-danger ms-3" id="btn-remove-file">Cambiar archivo</button>
        </div>

        <form id="report-form" style="display: none;">
            <input type="hidden" id="file_id">
            <input type="hidden" id="original_name">

            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label">Tipo de reporte</label>
                    <select class="form-select" id="modo" name="modo">
                        <option value="general">General (todos los días)</option>
                        <option value="persona">Por persona</option>
                    </select>
                </div>
                <div class="col-md-6" id="persona-group">
                    <label class="form-label">Persona</label>
                    <select class="form-select" id="persona" name="persona">
                        <option value="TODAS">-- Todas las personas --</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <button class="btn btn-link text-decoration-none p-0" type="button" data-bs-toggle="collapse" data-bs-target="#configAvanzada" aria-expanded="false" aria-controls="configAvanzada">
                    ▸ Mostrar configuración avanzada
                </button>
                <div class="collapse" id="configAvanzada">
                    <div class="config-panel">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small">Tardanza Leve (HH:MM)</label>
                                <input type="time" class="form-control form-control-sm" id="tardanza_leve" value="08:00">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Tardanza Severa (HH:MM)</label>
                                <input type="time" class="form-control form-control-sm" id="tardanza_severa" value="08:05">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Max. Almuerzo (minutos)</label>
                                <input type="number" class="form-control form-control-sm" id="max_almuerzo_min" value="60">
                            </div>
                            <div class="col-12">
                                <label class="form-label small">Personas a excluir (separadas por coma)</label>
                                <input type="text" class="form-control form-control-sm" id="excluidos" placeholder="Ej: Juan Perez, Maria Lopez">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg" id="btn-submit">
                    Generar Reporte PDF
                </button>
            </div>
            
            <div class="spinner-container" id="loading-spinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Generando...</span>
                </div>
                <p class="mt-2 text-muted fw-bold">Procesando registros y generando reporte...</p>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileInfo = document.getElementById('file-info');
    const fileNameDisplay = document.getElementById('file-name');
    const btnRemoveFile = document.getElementById('btn-remove-file');
    const reportForm = document.getElementById('report-form');
    const modoSelect = document.getElementById('modo');
    const personaGroup = document.getElementById('persona-group');
    const personaSelect = document.getElementById('persona');
    const errorAlert = document.getElementById('error-alert');
    const successAlert = document.getElementById('success-alert');
    const btnSubmit = document.getElementById('btn-submit');
    const loadingSpinner = document.getElementById('loading-spinner');

    // Manejo de arrastrar y soltar
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    dropZone.addEventListener('drop', (e) => {
        let dt = e.dataTransfer;
        let files = dt.files;
        handleFiles(files);
    });

    dropZone.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', function() {
        handleFiles(this.files);
    });

    function showError(msg) {
        errorAlert.textContent = msg;
        errorAlert.style.display = 'block';
        setTimeout(() => errorAlert.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
        successAlert.innerHTML = msg;
        successAlert.style.display = 'block';
        setTimeout(() => successAlert.style.display = 'none', 8000);
    }

    function handleFiles(files) {
        if (files.length === 0) return;
        const file = files[0];
        
        const ext = file.name.split('.').pop().toLowerCase();
        if (!['xls', 'xlsx', 'csv'].includes(ext)) {
            showError('Por favor seleccione un archivo .xls, .xlsx o .csv válido');
            return;
        }

        // Subir archivo
        const formData = new FormData();
        formData.append('archivo', file);

        dropZone.style.display = 'none';
        fileInfo.style.display = 'block';
        fileNameDisplay.textContent = `⏳ Subiendo archivo: ${file.name}...`;

        fetch('/subir', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                throw new Error(data.error);
            }
            
            document.getElementById('file_id').value = data.file_id;
            document.getElementById('original_name').value = data.original_name;
            fileNameDisplay.innerHTML = `✅ <b>${data.original_name}</b> subido correctamente.`;
            
            // Poblar select de personas
            personaSelect.innerHTML = '<option value="TODAS">-- Todas las personas --</option>';
            data.personas.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                personaSelect.appendChild(opt);
            });

            reportForm.style.display = 'block';
        })
        .catch(error => {
            showError(`Error al subir: ${error.message}`);
            resetUpload();
        });
    }

    function resetUpload() {
        fileInput.value = '';
        dropZone.style.display = 'block';
        fileInfo.style.display = 'none';
        reportForm.style.display = 'none';
    }

    btnRemoveFile.addEventListener('click', resetUpload);

    modoSelect.addEventListener('change', function() {
        if (this.value === 'persona') {
            personaGroup.style.display = 'block';
        } else {
            personaGroup.style.display = 'none';
        }
    });

    reportForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        btnSubmit.style.display = 'none';
        loadingSpinner.style.display = 'block';
        errorAlert.style.display = 'none';
        successAlert.style.display = 'none';

        const excluidosInput = document.getElementById('excluidos').value;
        const excluidosList = excluidosInput.split(',').map(s => s.trim()).filter(s => s);

        const requestData = {
            file_id: document.getElementById('file_id').value,
            original_name: document.getElementById('original_name').value,
            modo: document.getElementById('modo').value,
            persona: document.getElementById('persona').value,
            tardanza_leve: document.getElementById('tardanza_leve').value,
            tardanza_severa: document.getElementById('tardanza_severa').value,
            max_almuerzo_min: document.getElementById('max_almuerzo_min').value,
            excluidos: excluidosList
        };

        fetch('/generar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(requestData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                throw new Error(data.error);
            }
            
            showSuccess(`¡Reporte generado con éxito! <a href="${data.download_url}" download="${data.filename}" class="alert-link">Haz clic aquí para descargarlo</a> si no inicia automáticamente.`);
            
            const a = document.createElement('a');
            a.href = data.download_url;
            a.download = data.filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        })
        .catch(error => {
            showError(`Error al generar reporte: ${error.message}`);
        })
        .finally(() => {
            btnSubmit.style.display = 'block';
            loadingSpinner.style.display = 'none';
        });
    });
</script>
</body>
</html>
