[alembic]
# Ruta al directorio de migraciones
script_location = db/migrations

# La URL se lee del .env via env.py (no hardcodeada aquí)
sqlalchemy.url =

# Formato de los nombres de archivo de migración
file_template = %%(rev)s_%%(slug)s

# Zona horaria para los timestamps en los archivos generados
timezone = America/Guayaquil

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
