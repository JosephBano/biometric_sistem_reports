services:
  biometrico-app:
    build: .
    container_name: biometrico-app
    env_file:
      - .env
    volumes:
      # Volume nombrado: persiste la DB SQLite, uploads y reports
      # entre reinicios, actualizaciones de imagen y docker compose down
      - db_data:/data
      # Montar la zona horaria del host para que los reportes tengan la hora correcta
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

    # Mapeo de puerto: funciona en Linux, Windows y macOS.
    # El contenedor alcanza el dispositivo ZK en la red local a través del NAT de Docker.
    ports:
      - "5000:5000"
    # ALTERNATIVA solo para Linux con Docker Engine (no Docker Desktop):
    # network_mode: host da acceso directo a la red del host sin NAT.
    # Útil si el ZK está en una subnet que no es accesible por NAT.
    # Para usarla: comentar el bloque 'ports' y descomentar esta línea.
    # network_mode: host

volumes:
  db_data:
    # Volume nombrado gestionado por Docker.
    # Para hacer backup: docker cp rrhh-biometrico:/data/asistencias.db ./backup.db
    # Para ver la ruta física: docker volume inspect rrhh-biometrico_db_data
