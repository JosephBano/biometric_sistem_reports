version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: biometrico-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal     # ← red interna para hablar con app
      - frontend_net # ← red de NPM

  biometrico-app:
    build: .
    container_name: biometrico-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_data:/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - internal     # ← para conectarse a db
      - frontend_net # ← para que NPM lo alcance

volumes:
  postgres_data:
  app_data:

networks:
  internal:
    driver: bridge   # ← red privada entre app y db
  frontend_net:
    external: true
    name: frontend_net