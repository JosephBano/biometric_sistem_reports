services:
  db:
    image: postgres:16-alpine
    container_name: biometrico-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  biometrico-app:
    build: .
    container_name: biometrico-app
    env_file:
      - .env
    environment:
      # En Docker, la app se conecta al servicio 'db' (no localhost)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Uploads y reports como volumen nombrado
      - app_data:/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

    # Mapeo de puerto estándar. En Linux con Docker Engine se puede usar
    # network_mode: host para acceder al ZK sin NAT.
    # NOTA: network_mode: host es incompatible con depends_on; si se necesita,
    # levantar primero 'db' por separado: docker compose up -d db
    ports:
      - "5000:5000"
    # Para usar network_mode: host, comentar el bloque 'ports' y 'depends_on' de arriba
    # y descomentar la línea siguiente:
    # network_mode: host

volumes:
  postgres_data:
    # Datos de PostgreSQL. Backup: docker exec biometrico-db pg_dump -U user db > backup.sql
  app_data:
    # Uploads y reports generados por la app
